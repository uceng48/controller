// build-cordova.gradle → digunakan sebagai build-extras.gradle
android {
    compileSdkVersion 34
    defaultConfig {
        minSdkVersion 26
        targetSdkVersion 34
        multiDexEnabled true
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    // Tambahan untuk overlay (opsional)
    packagingOptions {
        pickFirst 'META-INF/*'
    }
}

dependencies {
    // Untuk kompatibilitas dengan Android 14+
    implementation 'androidx.core:core:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
